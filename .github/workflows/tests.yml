name: Android CI (Unit Tests)

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json
          echo "Verificando paquetes configurados en google-services.json:"
          grep -o '"package_name": "[^"]*"' app/google-services.json || echo "No se encontraron nombres de paquete"

      - name: Run Unit Tests
        run: ./gradlew test --stacktrace
